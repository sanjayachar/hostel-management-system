syntax = "proto3";

package auth;

option java_package = "com.hostel.proto.auth";
option java_multiple_files = true;

service AuthService {
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
}

message CreateUserRequest {
  string userName = 1;
  string password = 2;
  string role = 3;
}

message CreateUserResponse {
  int64 userId = 1;
}