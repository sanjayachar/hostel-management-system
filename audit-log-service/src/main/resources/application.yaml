    topic: hostel.audit.logs

spring:
  application:
    name: audit-log-service
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: audit-log-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.auditlog.auditlogservice.dto.AuditLogEvent
  datasource:
    url: jdbc:postgresql://localhost:5432/hostel_management_system
    username: postgres
    password: $@nju#29
  jpa:
    properties:
      hibernate:
        default_schema: hostel
    hibernate:
      ddl-auto: none
    show-sql: true
